<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thoát Nạn Phú Hòa - Mobile Optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f4f8; margin: 0; overflow-x: hidden; touch-action: none; }
        .header { background: #003366; color: white; padding: 10px; border-bottom: 3px solid #ff9800; }
        h2 { margin: 0; font-size: 1.1em; text-transform: uppercase; }
        .mission { background: #fff3cd; color: #856404; padding: 8px; margin: 5px auto; width: 92%; border-radius: 5px; font-size: 0.85em; font-weight: bold; border: 1px solid #ffeeba; }
        
        .map-box { position: relative; width: 98%; max-width: 1000px; margin: 5px auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; line-height: 0; border: 2px solid #003366; }
        .map-layers img { width: 100%; height: auto; display: none; pointer-events: none; }
        .map-layers img.active { display: block; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; }
        
        .controls { margin: 5px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        button { padding: 8px 10px; cursor: pointer; border-radius: 10px; border: 1px solid #003366; font-weight: bold; background: white; font-size: 0.75em; }
        button.active { background: #003366 !important; color: white !important; }
        
        .btn-check { background: #28a745 !important; color: white !important; border: none; }
        .btn-clear { background: #dc3545 !important; color: white !important; border: none; }
        .btn-download { background: #007bff !important; color: white !important; border: none; }

        #result-msg { margin: 5px auto; padding: 10px; border-radius: 8px; display: none; font-size: 0.9em; font-weight: bold; width: 90%; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; display: block !important; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; display: block !important; }

        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #photo-overlay img { max-width: 90%; max-height: 70%; border: 2px solid #ff9800; }
    </style>
</head>
<body>

<div class="header"><h2>MÔ PHỎNG THOÁT NẠN PHÚ HÒA</h2></div>
<div class="mission">Nhiệm vụ: Hãy tìm các tuyến đường an toàn, khu vực an toàn, và vùng an toàn để di chuyển từ khu vực nguy cơ đến nơi an toàn.</div>

<div class="controls">
    <button onclick="setLayer('GTHONG', this)" class="active">Giao thông</button>
    <button onclick="setLayer('MOHINHSODOCAO', this)">Địa hình</button>
    <button onclick="setLayer('CAP1', this)">Cấp 1</button>
    <button onclick="setLayer('CAP2', this)">Cấp 2</button>
    <button onclick="setLayer('CAP3', this)">Cấp 3</button>
    <button class="btn-clear" onclick="clearCanvas()">🧹 Xóa</button>
    <button class="btn-check" onclick="checkResult()">✅ KIỂM TRA</button>
    <button class="btn-download" onclick="nopBai()">💾 NỘP BÀI</button>
</div>

<div class="map-box" id="capture-area">
    <div class="map-layers">
        <img src="GTHONG.png" id="img-GTHONG" class="active">
        <img src="MOHINHSODOCAO.png" id="img-MOHINHSODOCAO">
        <img src="CAP1.png" id="img-CAP1">
        <img src="CAP2.png" id="img-CAP2">
        <img src="CAP3.png" id="img-CAP3">
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="result-msg"></div>

<div id="photo-overlay">
    <p>📱 NHẤN GIỮ VÀO ẢNH ĐỂ LƯU</p>
    <img id="result-photo" src="">
    <button onclick="closeOverlay()" style="margin-top:20px; padding:10px 20px; border-radius:20px; border:none; font-weight:bold;">QUAY LẠI</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('capture-area');
    let isCorrect = false; // Biến ghi nhận nếu học sinh đã chạm vùng đúng

    function resize() {
        const activeImg = document.querySelector('.map-layers img.active');
        canvas.width = container.offsetWidth;
        canvas.height = activeImg.offsetHeight;
    }
    window.onload = () => setTimeout(resize, 500);

    function setLayer(id, btn) {
        const temp = ctx.getImageData(0, 0, canvas.width, canvas.height);
        document.querySelectorAll('.map-layers img').forEach(img => img.classList.remove('active'));
        document.getElementById('img-' + id).classList.add('active');
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        resize();
        ctx.putImageData(temp, 0, 0);
        document.getElementById('result-msg').style.display = 'none';
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    // Cơ chế KIỂM TRA VÙNG (Phát hiện khi vẽ xuyên qua mục tiêu)
    function checkSafeZone(x, y) {
        const pX = x / canvas.width;
        const pY = y / canvas.height;

        const inTranSuyen = (pX > 0.36 && pX < 0.44 && pY > 0.36 && pY < 0.48);
        const inBVPhoHoa = (pX > 0.45 && pX < 0.55 && pY > 0.22 && pY < 0.38);
        const inDenTho = (pX > 0.62 && pX < 0.82 && pY > 0.38 && pY < 0.62);

        if (currentLevel === 'CAP1' || currentLevel === 'GTHONG') {
            if (inTranSuyen || inBVPhoHoa || inDenTho) isCorrect = true;
        } else {
            if (inTranSuyen) isCorrect = true;
        }
    }

    canvas.addEventListener('touchstart', (e) => {
        ctx.beginPath();
        const pos = getPos(e);
        ctx.moveTo(pos.x, pos.y);
    });

    canvas.addEventListener('touchmove', (e) => {
        const pos = getPos(e);
        ctx.lineWidth = 3; // Nét vẽ mảnh hơn cho di động
        ctx.strokeStyle = '#ff0000';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        checkSafeZone(pos.x, pos.y); // Kiểm tra ngay khi đang vẽ
        e.preventDefault();
    });

    function checkResult() {
        const msg = document.getElementById('result-msg');
        if (isCorrect) {
            msg.innerHTML = "✅ CHÍNH XÁC! Em đã tìm được vùng an toàn.";
            msg.className = "success";
        } else {
            msg.innerHTML = "❌ CHƯA ĐÚNG! Em cần vẽ đường đi chạm vào khu vực an toàn.";
            msg.className = "fail";
        }
        msg.style.display = "block";
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        isCorrect = false;
        document.getElementById('result-msg').style.display = 'none';
    }

    function nopBai() {
        html2canvas(document.getElementById('capture-area'), {useCORS: true}).then(canvasRes => {
            document.getElementById('result-photo').src = canvasRes.toDataURL();
            document.getElementById('photo-overlay').style.display = 'flex';
        });
    }

    function closeOverlay() { document.getElementById('photo-overlay').style.display = 'none'; }
</script>
</body>
</html>

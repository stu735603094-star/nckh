<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thoát Nạn Phú Hòa - Cấp 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Chống trượt màn hình trên di động */
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f4f8; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .header { background: #003366; color: white; padding: 10px; border-bottom: 3px solid #ff9800; }
        .mission { background: #fff3cd; color: #856404; padding: 10px; margin: 5px auto; width: 92%; border-radius: 8px; font-weight: bold; font-size: 0.85em; border: 1px solid #ffeeba; line-height: 1.4; }
        
        .map-box { position: relative; width: 96%; max-width: 800px; margin: 5px auto; background: white; border-radius: 8px; overflow: hidden; border: 2px solid #003366; touch-action: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .map-layers img { width: 100%; height: auto; display: none; -webkit-user-drag: none; }
        .map-layers img.active { display: block; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; }
        
        .controls { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; padding: 5px; }
        button { padding: 10px 12px; border-radius: 10px; border: 1px solid #003366; font-weight: bold; background: white; font-size: 0.8em; -webkit-tap-highlight-color: transparent; }
        button.active { background: #003366 !important; color: white !important; }
        
        .btn-check { background: #28a745 !important; color: white !important; border: none; }
        .btn-clear { background: #dc3545 !important; color: white !important; border: none; }
        .btn-save { background: #007bff !important; color: white !important; border: none; }

        #result-msg { margin: 5px auto; padding: 12px; border-radius: 8px; display: none; font-size: 0.9em; font-weight: bold; width: 90%; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block !important; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block !important; }

        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #photo-overlay img { max-width: 90%; max-height: 70%; border: 2px solid white; border-radius: 5px; }
        .close-ov { margin-top: 20px; padding: 12px 30px; background: white; color: black; border: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h2>MÔ PHỎNG THOÁT NẠN PHÚ HÒA</h2></div>
<div class="mission">Nhiệm vụ: Hãy tìm các tuyến đường an toàn, khu vực an toàn, và vùng an toàn để di chuyển từ khu vực nguy cơ đến nơi an toàn.</div>

<div class="controls">
    <button onclick="setLayer('GTHONG', this)" class="active">Giao thông</button>
    <button onclick="setLayer('CAP1', this)">Cấp 1 (Báo động)</button>
    <button class="btn-clear" onclick="clearCanvas()">🧹 Xóa vẽ</button>
    <button class="btn-check" onclick="checkResult()">✅ KIỂM TRA</button>
    <button class="btn-save" onclick="nopBai()">💾 NỘP BÀI</button>
</div>

<div class="map-box" id="capture-area">
    <div class="map-layers">
        <img src="GTHONG.png" id="img-GTHONG" class="active">
        <img src="CAP1.png" id="img-CAP1">
        <canvas id="canvas"></canvas>
    </div>
